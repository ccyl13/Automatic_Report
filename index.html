                                        </div>
                                    </div>
                                )
                            })
                        )}
                        
                        <div className="mt-20 pt-4 border-t border-gray-200 flex justify-between text-[10px] text-gray-400 uppercase tracking-widest print-border">
                            <div>{t.classifications[auditData.classification]} • {t.prepFor} {auditData.clientCompany}<br/>{t.genBy}</div>
                            <div className="text-right">{t.reportVer} {auditData.version}<br/>{auditData.date}</div>
                        </div>
                    </div>

                </div>
            );

            return (
                <div className="min-h-screen flex flex-col font-sans relative">
                    {showSplash && <SplashScreen onEnter={() => setShowSplash(false)} lang={lang} t={t} toggleLanguage={toggleLanguage} />}
                    
                    {/* TOP NAVBAR */}
                    <header className="bg-brand-950 text-white shadow-md no-print sticky top-0 z-40">
                        <div className="max-w-screen-2xl mx-auto px-3 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
                            <div className="flex items-center space-x-2 sm:space-x-3">
                                <div className="text-brand-500"><Icons.Shield className="w-8 h-8 sm:w-10 sm:h-10 text-brand-500" /></div>
                                <h1 className="hidden md:block text-lg sm:text-xl font-bold tracking-tight truncate">{t.appTitle}</h1>
                            </div>
                            
                            <div className="flex items-center space-x-1 sm:space-x-4">
                                <button 
                                    onClick={toggleLanguage}
                                    className="px-2 sm:px-3 py-1.5 rounded-full border border-gray-700 bg-gray-800 hover:bg-gray-700 font-bold text-[10px] sm:text-xs flex items-center transition-colors"
                                >
                                    <Icons.Globe className="w-3 h-3 sm:w-4 sm:h-4 sm:mr-2" />
                                    <span className="hidden sm:inline">{lang === 'es' ? '🇪🇸 ES' : '🇬🇧 EN'}</span>
                                </button>

                                <div className="w-px h-4 sm:h-6 bg-gray-700 mx-1 sm:mx-2"></div>

                                <button 
                                    onClick={() => setActiveTab('editor')}
                                    className={`px-2 sm:px-4 py-1.5 sm:py-2 rounded-md font-semibold text-[10px] sm:text-sm transition-all flex items-center ${activeTab === 'editor' ? 'bg-brand-600 text-white shadow' : 'text-gray-300 hover:text-white hover:bg-white/10'}`}
                                >
                                    <Icons.Edit className="w-3 h-3 sm:w-4 sm:h-4 sm:mr-2" />
                                    <span className="hidden sm:inline">{t.editPanel}</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab('preview')}
                                    className={`px-2 sm:px-4 py-1.5 sm:py-2 rounded-md font-semibold text-[10px] sm:text-sm transition-all flex items-center ${activeTab === 'preview' ? 'bg-brand-600 text-white shadow' : 'text-gray-300 hover:text-white hover:bg-white/10'}`}
                                >
                                    <Icons.Eye className="w-3 h-3 sm:w-4 sm:h-4 sm:mr-2" />
                                    <span className="hidden sm:inline">{t.preview}</span>
                                </button>
                                
                                <div className="w-px h-4 sm:h-6 bg-gray-700 mx-1 sm:mx-2"></div>

                                <button 
                                    onClick={triggerPrint}
                                    className="px-3 sm:px-5 py-1.5 sm:py-2 bg-emerald-500 hover:bg-emerald-400 text-white rounded-md font-bold text-[10px] sm:text-sm flex items-center shadow-md transition-colors"
                                >
                                    <Icons.Download className="w-3 h-3 sm:w-4 sm:h-4 sm:mr-2" />
                                    <span className="hidden sm:inline">{t.generatePdf}</span>
                                    <span className="sm:hidden ml-1">PDF</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-grow p-2 sm:p-4 md:p-8 w-full overflow-hidden">
                        <div className={activeTab === 'editor' ? 'block no-print' : 'hidden'}>
                            {renderEditor()}
                        </div>
                        {/* Se utiliza overflow-x-auto para que el visor A4 pueda deslizarse lateralmente en móvil sin romper la app */}
                        <div className={activeTab === 'preview' ? 'block py-4 sm:py-8 bg-gray-200 overflow-x-auto w-full' : 'hidden print-only'}>
                            <div className="min-w-[210mm] w-max mx-auto px-2">
                                {renderPreview()}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
