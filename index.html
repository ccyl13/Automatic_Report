<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentestify | Security Report Generator</title>
    
    <!-- Favicon dinámico SVG -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/></svg>" />

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    -->

    <script src="js/config/constants.js" type="text/babel"></script>
    
    <!-- 2. Servicios API -->
    <script src="js/services/api.js" type="text/babel"></script>
    
    <!-- 3. Datos e Internacionalización -->
    <script src="js/data/i18n.js" type="text/babel"></script>
    <script src="js/data/templates.js" type="text/babel"></script>

    <script src="js/components/Icons.js" type="text/babel"></script>
    <script src="js/data/authors.js" type="text/babel"></script>
    <script src="js/components/SplashScreen.js" type="text/babel"></script>
    <script src="js/components/App.js" type="text/babel"></script>

    <script src="js/main.js" type="text/babel"></script>
